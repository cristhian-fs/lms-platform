name: lms_platform

services:
  postgres:
    image: postgres:16
    container_name: lms_platform-postgres
    environment:
      POSTGRES_DB: lms_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "1010:5432"
    volumes:
      - lms_platform_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  lms_platform_postgres_data:
